<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Myntra - Login</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #e6e6fa, #fbeaff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.2);
      width: 320px;
      text-align: center;
    }

    .login-container h2 {
      color: #ff3f6c;
      margin-bottom: 20px;
    }

    .login-container input[type="text"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .login-container .show-pass {
      display: flex;
      align-items: center;
      font-size: 14px;
      margin-bottom: 10px;
      color: #333;
    }

    .login-container button {
      background-color: #ff3f6c;
      color: white;
      border: none;
      padding: 10px 20px;
      width: 100%;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-container button:hover {
      background-color: #e63358;
    }

    .login-container a {
      display: block;
      margin-top: 15px;
      text-decoration: none;
      font-size: 14px;
      color: #666;
    }

    .login-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Welcome to Myntra</h2>
    <form onsubmit="return validateLogin()">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <div class="show-pass">
        <input type="checkbox" onclick="togglePassword()" id="show"> &nbsp;<label for="show">Show Password</label>
      </div>
      <button type="submit">Login</button>
      <a href="index.html">← Back to Homepage</a>
    </form>
  </div>

  <script>
    function togglePassword() {
      const pass = document.getElementById("password");
      pass.type = pass.type === "password" ? "text" : "password";
    }

    function validateLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "admin" && password === "1234") {
        alert("Login successful!");
        window.location.href = "index.html";
        return false; // prevent form submission
      } else {
        alert("Invalid credentials!");
        return false;
      }
    }
  </script>

</body>
</html>
