<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<input type>, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to right, slateblue, lightblue);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .container {
      background-color:linear-gradient(to left, slateblue, lightblue);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      width: 300px;
    }

    input {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input[type="submit"] {
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    input[type="submit"]:hover {
      background-color: #45a049;
    }

    #message {
      font-weight: bold;
      margin-top: 10px;
      animation: fadeIn 0.5s ease-in-out;
    }

    .match {
      color: green;
    }

    .no-match {
      color: red;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    </style>
</head>
<body>
    <div class="container">
      <h3 color="red">WELCOME TO MYNTRA</h3>
        <form onsubmit="return validateForm()">
            <input type="text" id="username" placeholder="enter username">
            <input type="password" id="password" placeholder="enter password">
            <input type="password" id="confirm" placeholder="confirm password">
            <div id="message"></div>
            <input type="submit" value="submit">
        </form>
    </div>
    <script>
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirm');
        const message = document.getElementById('message')

        function checkMatch() {
        if(confirm.value===""){
            message.textContent="";message.className="";
        }
        else if(password.value===confirm.value){
            message.textContent="password is confirmed";
            message.className="match";
        }
        else{
            message.textContent="passowrd do not match";
            message.className="no-match";
        }
        }
        function validateForm(){
            if(password.value !==confirm.value){
                alert("password do not match!!");
                return false;
            }
            return true;
        }
        password.addEventListener('input',checkMatch);
        confirm.addEventListener('input',checkMatch);

    </script>
</body>
</html>
